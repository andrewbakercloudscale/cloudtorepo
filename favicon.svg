  <ellipse cx="13" cy="16" rx="3.5" ry="3" fill="white" opacity="0.95"/>
  <ellipse cx="19" cy="16" rx="3" ry="2.5" fill="white" opacity="0.95"/>
  <!-- Up arrow -->
